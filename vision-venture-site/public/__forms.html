<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <!--
      Netlify deploy-time form detection file.
      This page is not meant to be visited by users.
    -->
    <form name="ai-ops-audit" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="ai-ops-audit" />
      <input name="bot-field" type="text" />

      <input name="name" type="text" />
      <input name="email" type="email" />
      <input name="company" type="text" />
      <input name="role" type="text" />
      <textarea name="automation_goal"></textarea>
      <input name="systems" type="text" />
      <input name="timeline" type="text" />
    </form>
  </body>
</html>
